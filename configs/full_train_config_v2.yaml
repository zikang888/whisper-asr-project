model:
  name: "/root/autodl-tmp/whisper-small-local"
  language: "en"
  task: "transcribe"
  use_fp16: true

data:
  dataset_name: "librispeech_asr"
  subset: "clean"
  split: "train.100+train.360"
  sample_rate: 16000

training:
  output_dir: "/root/autodl-tmp/whisper-full-train-output-v2"
  logging_dir: "/root/autodl-tmp/whisper-full-train-logs-v2"
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  warmup_steps: 500
  max_steps: 2000
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  num_workers: 4
  dataloader_pin_memory: true
  report_to: "none"
  gradient_checkpointing: true
  optim: "adamw_torch"
  prediction_loss_only: true
  fp16_full_eval: true
  save_total_limit: 2

validation:
  eval_subset: "validation"
  max_eval_samples: 2703
