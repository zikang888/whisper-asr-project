model:
  name: "/root/autodl-tmp/whisper-small-local"
  language: "en"
  task: "transcribe"
  use_fp16: true

data:
  dataset_name: "librispeech_asr"
  subset: "clean"
  split: "test"
  sample_rate: 16000

training:
  output_dir: "/root/autodl-tmp/whisper-output"
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 1e-4
  warmup_steps: 10
  max_steps: 50
  eval_steps: 25
  save_steps: 25
  logging_steps: 5
  num_workers: 2
  dataloader_pin_memory: true
  report_to: "none"
  gradient_checkpointing: false
  optim: "adamw_torch"
  prediction_loss_only: false
  fp16_full_eval: true

validation:
  eval_subset: "test"
  max_eval_samples: 50
