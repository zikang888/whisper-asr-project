model:
  name: "/root/autodl-tmp/whisper-small-local"
  language: "en"
  task: "transcribe"
  use_fp16: true

data:
  dataset_name: "librispeech_asr"
  subset: "clean"
  split: "test"
  sample_rate: 16000

training:
  output_dir: "/root/autodl-tmp/whisper-output"
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 5e-5
  warmup_steps: 100
  max_steps: 500
  eval_steps: 100
  save_steps: 100
  logging_steps: 20
  # 🔥 核心修复：改成 0，彻底解决加载卡死！
  num_workers: 0
  dataloader_pin_memory: true
  report_to: "none"

validation:
  eval_subset: "test"
